[tools]
k3d    = "5.8.3"   # pinned to installed version; spec requires ≥ v5.6
kubectl = "1.34.1"  # pinned to installed version; spec requires ≥ v1.28
jq     = "1.7.1"   # pinned to installed version
task   = "latest"   # Taskfile.dev; spec requires ≥ v3.30

# Not managed by mise — install separately:
#
#   Claude Code CLI ≥ v2.1.129
#     https://claude.ai/download
#
#   Docker Desktop or Podman 4.x
#     https://docs.docker.com/get-docker/
#
#   envsubst (GNU gettext) — used by `task up` to seal the LiteLLM secret
#     macOS:  brew install gettext
#     Debian: apt-get install gettext-base
#     Fedora: dnf install gettext
