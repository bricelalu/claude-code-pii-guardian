apiVersion: apps/v1
kind: Deployment
metadata:
  name: presidio-anonymizer
  namespace: gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: presidio-anonymizer
  template:
    metadata:
      labels:
        app: presidio-anonymizer
    spec:
      containers:
        - name: presidio-anonymizer
          # DIGEST_NOT_PINNED — run: task pin-images
          image: mcr.microsoft.com/presidio-anonymizer:latest@sha256:a10a12a2a613d13cf29d3ad3641e3258444dd8c90403dd644a0a114c472c2483
          ports:
            - containerPort: 3000
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 5
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: presidio-anonymizer
  namespace: gateway
spec:
  selector:
    app: presidio-anonymizer
  ports:
    - port: 3000
      targetPort: 3000
  type: ClusterIP
