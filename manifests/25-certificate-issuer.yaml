apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: selfsigned
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: litellm-tls
  namespace: gateway
spec:
  secretName: litellm-tls
  duration: 2160h # 90 days
  renewBefore: 720h # 30 days
  commonName: litellm.local
  dnsNames:
    - litellm.local
    - litellm.gateway.svc.cluster.local
    - litellm.gateway.svc
  issuerRef:
    name: selfsigned
    kind: ClusterIssuer
