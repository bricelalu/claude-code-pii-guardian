apiVersion: helm.cattle.io/v1
kind: HelmChartConfig
metadata:
  name: traefik
  namespace: kube-system
spec:
  valuesContent: |-
    ports:
      web:
        port: 8000
        exposedPort: 80
        expose:
          default: true
        hostPort: 80
      websecure:
        port: 8443
        exposedPort: 443
        expose:
          default: true
        hostPort: 443
