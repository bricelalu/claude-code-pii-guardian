apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-config
  namespace: gateway
data:
  config.yaml: |
    model_list:
      - model_name: "claude-sonnet-4-6"
        litellm_params:
          model: "anthropic/claude-sonnet-4-6"
          max_tokens: 4096
      - model_name: "claude-opus-4-7"
        litellm_params:
          model: "anthropic/claude-opus-4-7"
          max_tokens: 4096
      - model_name: "claude-haiku-4-5"
        litellm_params:
          model: "anthropic/claude-haiku-4-5-20251001"
          max_tokens: 4096

    general_settings:
      master_key: "os.environ/LITELLM_MASTER_KEY"

    guardrails:
      - guardrail_name: "presidio-mask"
        litellm_params:
          guardrail: presidio
          mode: "pre_call"
          default_on: true
          presidio_language: "en"
          presidio_score_thresholds:
            ALL: 0.6
            PERSON: 0.75
          pii_entities_config:
            EMAIL_ADDRESS: "MASK"
            PERSON: "MASK"
            PHONE_NUMBER: "MASK"
            CREDIT_CARD: "BLOCK"
            IBAN_CODE: "BLOCK"

      - guardrail_name: "presidio-audit"
        litellm_params:
          guardrail: presidio
          mode: "logging_only"
          default_on: true
          presidio_language: "en"
          presidio_score_thresholds:
            ALL: 0.35
          pii_entities_config:
            EMAIL_ADDRESS: "MASK"
            PERSON: "MASK"
            PHONE_NUMBER: "MASK"
            LOCATION: "MASK"
            DATE_TIME: "MASK"

    litellm_settings:
      forward_llm_provider_auth_headers: true
      set_verbose: true
      json_logs: true
      max_tokens: 4096
      drop_params: true
