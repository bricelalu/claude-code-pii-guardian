apiVersion: k3d.io/v1alpha5
kind: Simple
metadata:
  name: claude-gateway-poc
servers: 1
agents: 0
ports:
  - port: 8443:443
    nodeFilters:
      - loadbalancer
  - port: 8080:80
    nodeFilters:
      - loadbalancer
options:
  k3s:
    extraArgs:
      - arg: --disable=servicelb
        nodeFilters:
          - server:*
